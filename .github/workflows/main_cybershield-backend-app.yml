# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - cybershield-backend-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrcybersolveprism7304.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_855F7D9876294231BF0F475766A2AD00 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_2EC17B5E34024AAD9878CDBBB98FD8C8 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrcybersolveprism7304.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_855F7D9876294231BF0F475766A2AD00 }}/acrcybersolveprism7304/acrcybersolveprism7304/cybershield-backend:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FDFE37B8F1114F328C340BE334B34578 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_93323F193F954D00BE8D228B308D25AA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BB044F32D70F4ACFA64CA5A89211DE1C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'cybershield-backend-app'
          slot-name: 'Production'
          images: 'acrcybersolveprism7304.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_855F7D9876294231BF0F475766A2AD00 }}/acrcybersolveprism7304/acrcybersolveprism7304/cybershield-backend:${{ github.sha }}'
          